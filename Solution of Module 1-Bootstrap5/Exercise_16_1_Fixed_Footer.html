<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Footer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h2>Fixed Footer Demonstration</h2>
        <p>Scroll down to see the footer stuck at the bottom of the viewport.</p>
        <div style="height: 100vh;">Spacer to test scrolling</div>
    </div>
    <!-- Fixed footer using position-fixed bottom-0 -->
    <footer class="position-fixed bottom-0 start-0 w-100 bg-dark text-white text-center py-3">
        &copy; 2026 EventPortal - Fixed Bottom Footer
    </footer>
</body>
</html>
