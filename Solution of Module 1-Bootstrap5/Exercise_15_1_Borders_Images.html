<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borders and Image Utilities</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5 text-center">
        <h2>Image Border Utilities</h2>
        <!-- border, border-primary, border-3, rounded-circle on image -->
        <img src="community_event.png" class="border border-primary border-3 rounded-circle" style="width: 150px; height: 150px; object-fit: cover;" alt="Circular Styled Profile">
        <p class="mt-3 text-muted">Image styled with border-primary, border-3, and rounded-circle.</p>
    </div>
</body>
</html>
