<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Flexbox Alignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h2>Card with Flexbox Alignment</h2>
        <div class="card" style="max-width: 400px; margin: 0 auto;">
            <div class="card-body">
                <!-- Flex container inside card header to space title and tag -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="card-title m-0">Event Title</h5>
                    <span class="badge bg-danger">Featured</span>
                </div>
                <p class="card-text">Special event descriptions placed here.</p>
                <a href="#" class="btn btn-primary">Join Event</a>
            </div>
        </div>
    </div>
</body>
</html>
