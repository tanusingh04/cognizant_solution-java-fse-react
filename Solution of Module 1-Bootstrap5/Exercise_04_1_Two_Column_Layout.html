<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Column Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h2 class="mb-4">Two-Column Layout</h2>
        <div class="row">
            <!-- Sidebar (col-md-3) -->
            <aside class="col-md-3 bg-light p-3 border-end">
                <h4>Sidebar</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="#" class="nav-link active">Home</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Events</a></li>
                    <li class="nav-item"><a href="#" class="nav-link">Registrations</a></li>
                </ul>
            </aside>
            <!-- Content Area (col-md-9) -->
            <main class="col-md-9 p-3">
                <h3>Main Content Area</h3>
                <p>This area spans 9 grid columns on medium devices and above. On smaller devices, both columns stack vertically.</p>
            </main>
        </div>
    </div>
</body>
</html>
