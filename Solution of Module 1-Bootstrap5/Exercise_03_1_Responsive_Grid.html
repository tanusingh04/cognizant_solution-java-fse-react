<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Grid Columns</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .grid-box {
            background-color: #0d6efd;
            color: white;
            padding: 20px;
            text-align: center;
            border: 1px solid #ffffff;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2 class="mb-4 text-center">Responsive Grid (3 Columns)</h2>
        <p class="text-center text-muted">Stacks vertically on mobile, 2 per row on tablets, 3 per row on desktops.</p>
        
        <!-- Grid layout matching prompt sizes:
             Mobile (<576px): col-12 (vertical stack)
             Tablet (>=576px): col-sm-6 (2 per row)
             Desktop (>=768px): col-md-4 (3 per row) -->
        <div class="row g-3">
            <div class="col-12 col-sm-6 col-md-4">
                <div class="grid-box">Column 1</div>
            </div>
            <div class="col-12 col-sm-6 col-md-4">
                <div class="grid-box">Column 2</div>
            </div>
            <div class="col-12 col-sm-6 col-md-4">
                <div class="grid-box">Column 3</div>
            </div>
        </div>
    </div>
</body>
</html>
