<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Typography</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h1 class="display-1">Display 1 Heading</h1>
        <p class="lead">This is a lead paragraph helper designed to stand out.</p>
        <p class="text-muted">This is muted secondary metadata text.</p>
        <p class="fw-bold">Bold font weight demonstration.</p>
    </div>
</body>
</html>
