<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows and Cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <!-- shadow, shadow-lg, and rounded-pill inside card elements -->
        <div class="card shadow-lg p-4 mb-4 bg-white rounded">
            <h5>Card with shadow-lg</h5>
            <p>This container features large shadows and soft edges.</p>
            <button class="btn btn-primary rounded-pill w-50">Rounded Pill Button</button>
        </div>
    </div>
</body>
</html>
