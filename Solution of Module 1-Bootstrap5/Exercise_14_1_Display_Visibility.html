<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display and Visibility</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5 text-center">
        <h2>Display Visibility Helpers</h2>
        <div class="d-none d-md-block bg-primary text-white p-3 mb-2">
            Shown only on Tablets (md) and above (d-none d-md-block).
        </div>
        <div class="d-lg-flex justify-content-center bg-success text-white p-3 mb-2">
            Shown as Flex on Desktops (lg) and above (d-lg-flex).
        </div>
        <p class="text-muted">Try resizing the window to see panels toggle visibility.</p>
    </div>
</body>
</html>
