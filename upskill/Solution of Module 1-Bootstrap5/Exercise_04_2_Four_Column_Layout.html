<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Four Column Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-demo {
            background-color: #e9ecef;
            padding: 20px;
            text-align: center;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2 class="mb-4">Four-Column Layout (col-sm-3)</h2>
        <!-- Equal width columns on small devices and above -->
        <div class="row g-3">
            <div class="col-sm-3">
                <div class="card-demo">Card 1</div>
            </div>
            <div class="col-sm-3">
                <div class="card-demo">Card 2</div>
            </div>
            <div class="col-sm-3">
                <div class="card-demo">Card 3</div>
            </div>
            <div class="col-sm-3">
                <div class="card-demo">Card 4</div>
            </div>
        </div>
    </div>
</body>
</html>
