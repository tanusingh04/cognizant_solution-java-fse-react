<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Groups and Checkboxes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5 text-center">
        <h2>Button Groups and Toggle Checks</h2>
        
        <!-- Standard Button Group -->
        <div class="btn-group my-3" role="group">
            <button type="button" class="btn btn-dark">Left</button>
            <button type="button" class="btn btn-dark">Middle</button>
            <button type="button" class="btn btn-dark">Right</button>
        </div>
        
        <br>
        
        <!-- Checkbox Button Toggles -->
        <div class="btn-group my-3" role="group">
            <input type="checkbox" class="btn-check" id="btncheck1" autocomplete="off">
            <label class="btn-outline-primary btn" for="btncheck1">Option 1</label>

            <input type="checkbox" class="btn-check" id="btncheck2" autocomplete="off">
            <label class="btn-outline-primary btn" for="btncheck2">Option 2</label>
        </div>
    </div>
</body>
</html>
