<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="card" style="width: 18rem; margin: 0 auto;">
            <img src="community_event.png" class="card-img-top" alt="Profile Banner">
            <div class="card-body">
                <h5 class="card-title">Alice Johnson</h5>
                <p class="card-text">Chief event coordinator of the Local Community Event Portal.</p>
                <a href="#" class="btn btn-primary">Contact Coordinator</a>
            </div>
        </div>
    </div>
</body>
</html>
