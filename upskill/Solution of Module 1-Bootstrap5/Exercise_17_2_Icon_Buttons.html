<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Icon-Only Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="container py-5 text-center">
        <h2>Icon Buttons Replacement</h2>
        <div class="mt-3">
            <button class="btn btn-primary me-2"><i class="bi bi-send"></i> Send</button>
            <!-- Icon-only buttons -->
            <button class="btn btn-outline-danger me-2" aria-label="Delete"><i class="bi bi-trash"></i></button>
            <button class="btn btn-outline-secondary" aria-label="Edit"><i class="bi bi-pencil"></i></button>
        </div>
    </div>
</body>
</html>
