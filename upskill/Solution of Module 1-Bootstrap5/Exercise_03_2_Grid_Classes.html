<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Classes Demonstration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .col-demo {
            background-color: #6c757d;
            color: white;
            padding: 10px;
            text-align: center;
            border: 1px solid #fff;
        }
    </style>
</head>
<body>
    <!-- Container wrapper -->
    <div class="container py-5">
        <h2>Grid system helpers</h2>
        
        <!-- Row wrapper -->
        <div class="row my-3">
            <div class="col-sm-4"><div class="col-demo">col-sm-4</div></div>
            <div class="col-sm-8"><div class="col-demo">col-sm-8</div></div>
        </div>
        
        <div class="row my-3">
            <div class="col-6 col-md-3"><div class="col-demo">col-6 col-md-3</div></div>
            <div class="col-6 col-md-9"><div class="col-demo">col-6 col-md-9</div></div>
        </div>
    </div>
</body>
</html>
