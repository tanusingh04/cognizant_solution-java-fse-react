<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Text Transformation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h2>Text Transformations</h2>
        <p class="text-uppercase">this text was lowercase and is now uppercase.</p>
        <p class="text-lowercase">THIS TEXT WAS UPPERCASE AND IS NOW LOWERCASE.</p>
        <p class="text-capitalize">this text is capitalized.</p>
    </div>
</body>
</html>
