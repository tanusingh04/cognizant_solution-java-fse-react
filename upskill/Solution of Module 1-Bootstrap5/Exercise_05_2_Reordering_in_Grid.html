<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Column Reordering</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .box {
            padding: 20px;
            color: white;
            text-align: center;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2>Column Reordering</h2>
        <p>Columns will show as Box A then Box B on mobile, but reordered on medium displays and above.</p>
        
        <div class="row g-3">
            <!-- Order-md-2 shifts this to second column on medium screens -->
            <div class="col-12 col-md-6 order-md-2">
                <div class="box bg-primary">Box A (order-md-2)</div>
            </div>
            <!-- Order-md-1 shifts this to first column on medium screens -->
            <div class="col-12 col-md-6 order-md-1">
                <div class="box bg-success">Box B (order-md-1)</div>
            </div>
        </div>
    </div>
</body>
</html>
