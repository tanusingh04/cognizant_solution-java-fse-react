<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Sidebar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row">
            <!-- Sidebar shows only on tablets and above (d-none d-md-block) -->
            <aside class="col-md-3 bg-dark text-white p-3 d-none d-md-block rounded">
                <h5>Sidebar Menu</h5>
                <ul class="nav flex-column">
                    <li class="nav-item"><a href="#" class="nav-link text-white">Dashboard</a></li>
                    <li class="nav-item"><a href="#" class="nav-link text-white">Security</a></li>
                </ul>
            </aside>
            <main class="col-12 col-md-9 p-3">
                <h2>Content Area</h2>
                <p>The sidebar next to this text will disappear on mobile screens and only appear on tablets and above.</p>
            </main>
        </div>
    </div>
</body>
</html>
