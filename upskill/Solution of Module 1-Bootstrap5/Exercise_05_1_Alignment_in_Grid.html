<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alignment in Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .align-container {
            min-height: 200px;
            background-color: #f8f9fa;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2>Grid Alignment: justify-content-center and align-items-center</h2>
        <!-- Centering both horizontally and vertically -->
        <div class="row align-container justify-content-center align-items-center">
            <div class="col-auto bg-primary text-white p-3 rounded">
                Centered Content Box
            </div>
        </div>
    </div>
</body>
</html>
