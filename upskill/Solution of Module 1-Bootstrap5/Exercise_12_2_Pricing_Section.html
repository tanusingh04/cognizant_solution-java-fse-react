<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Section</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5 text-center">
        <h2 class="mb-4">Pricing Plans</h2>
        <div class="row g-4 justify-content-center">
            <div class="col-md-4">
                <div class="card p-3 shadow-sm">
                    <div class="card-body py-4">
                        <h5 class="card-title text-muted text-uppercase">Basic</h5>
                        <h3 class="card-price py-2">$0</h3>
                        <p class="card-text text-muted">Access to free public events</p>
                        <button class="btn btn-outline-primary mt-3 w-100">Sign Up Free</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 shadow-sm border-primary">
                    <div class="card-body py-4">
                        <h5 class="card-title text-primary text-uppercase">Premium</h5>
                        <h3 class="card-price py-2">$15<span class="fs-6">/mo</span></h3>
                        <p class="card-text text-muted">Access to all conferences and workshops</p>
                        <button class="btn btn-primary mt-3 w-100">Get Premium</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
