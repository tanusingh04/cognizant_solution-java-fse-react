<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Object Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h2>Media Object (Flex Layout)</h2>
        <!-- Media object equivalent in BS5 using flex utilities -->
        <div class="d-flex align-items-start border p-3 rounded">
            <img src="community_event.png" class="me-3 rounded" style="width: 80px; height: 80px; object-fit: cover;" alt="Event Thumbnail">
            <div>
                <h5>Annual Art Competition</h5>
                <p class="m-0">Participants from all schools are invited to show their masterpieces. Awesome prices and certificates will be distributed to winners.</p>
            </div>
        </div>
    </div>
</body>
</html>
