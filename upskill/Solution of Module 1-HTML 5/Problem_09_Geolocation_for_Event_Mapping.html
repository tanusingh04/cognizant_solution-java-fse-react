<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geolocation for Event Mapping</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .geo-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #1f2937;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin: 20px 0;
        }
        button:hover {
            background-color: #2563eb;
        }
        .result-box {
            background-color: #f9fafb;
            border: 1px dashed #d1d5db;
            padding: 15px;
            border-radius: 4px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            word-break: break-all;
        }
        .coordinates {
            font-family: monospace;
            font-size: 1.1em;
            color: #059669;
            font-weight: bold;
        }
        .error-msg {
            color: #dc2626;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="geo-card">
        <h2>Find Nearby Events</h2>
        <p>Click the button below to retrieve your current geographical coordinates. This information will help us locate events happening near you.</p>
        
        <button onclick="getUserLocation()">Find Nearby Events</button>
        
        <div class="result-box" id="resultContainer">
            <span style="color: #6b7280;">Your coordinates will be shown here.</span>
        </div>
    </div>

    <script>
        function getUserLocation() {
            var container = document.getElementById('resultContainer');
            container.innerHTML = '<span style="color: #3b82f6;">Requesting GPS coordinates...</span>';

            if (!navigator.geolocation) {
                container.innerHTML = '<span class="error-msg">Geolocation is not supported by your browser.</span>';
                return;
            }

            // Options for high accuracy, timeout, and maximum age
            var options = {
                enableHighAccuracy: true,
                timeout: 10000,          // 10 seconds timeout
                maximumAge: 0            // Force fresh location retrieval
            };

            navigator.geolocation.getCurrentPosition(successCallback, errorCallback, options);
        }

        function successCallback(position) {
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;
            var accuracy = position.coords.accuracy;
            
            var container = document.getElementById('resultContainer');
            container.innerHTML = '<div><strong>Coordinates Found!</strong></div>' +
                                  '<div class="coordinates">Latitude: ' + lat.toFixed(6) + '</div>' +
                                  '<div class="coordinates">Longitude: ' + lon.toFixed(6) + '</div>' +
                                  '<div style="font-size: 0.85em; color: #6b7280; margin-top: 5px;">Accuracy: within ' + accuracy + ' meters</div>';
        }

        function errorCallback(error) {
            var container = document.getElementById('resultContainer');
            var errorMsg = "";

            switch (error.code) {
                case error.PERMISSION_DENIED:
                    errorMsg = "Permission denied. Please grant location access to find nearby events.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    errorMsg = "Location information is currently unavailable.";
                    break;
                case error.TIMEOUT:
                    errorMsg = "Request to get user location timed out. Try again.";
                    break;
                default:
                    errorMsg = "An unknown error occurred while retrieving location.";
                    break;
            }

            container.innerHTML = '<span class="error-msg">Error: ' + errorMsg + '</span>';
        }
    </script>
</body>
</html>
